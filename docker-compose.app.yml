networks:
  web:
    external: true
  backend:
    driver: bridge

services:
  backend:
    image: "${DOCKER_USER_NAME}/${DOCKER_IMAGE_NAME}-be:latest"
    container_name: backend
    restart: always
    env_file:
      - backend-secret.env
    ports:
      - "8080:8080"
    labels:
      - "traefik.enable=true"
    networks:
      - backend
      - web

  redis:
    image: redis:6.0
    container_name: redis
    ports:
      - "6379:6379"
    networks:
      - backend
