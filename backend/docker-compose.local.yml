# Development Database Only
# MySQL + Redis for local Spring Boot development

networks:
  dev-network:
    driver: bridge

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: techeer-mysql-dev
    restart: unless-stopped
    env_file:
      - ./backend-secret.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: techeer-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    env_file:
      - ./backend-secret.env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # OpenSearch (Full-text Search Engine with Nori Korean Morphology Plugin)
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: techeer-opensearch-local
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - DISABLE_SECURITY_PLUGIN=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
    entrypoint:
      - /bin/bash
      - -c
      - |
        /usr/share/opensearch/bin/opensearch-plugin install --batch analysis-nori || true
        /usr/share/opensearch/opensearch-docker-entrypoint.sh
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_local_data:/usr/share/opensearch/data
    networks:
      - dev-network
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  # OpenSearch Dashboards (Dev UI for OpenSearch)
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: techeer-opensearch-dashboards-local
    restart: unless-stopped
    environment:
      - OPENSEARCH_HOSTS=http://opensearch:9200
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    ports:
      - "5601:5601"
    networks:
      - dev-network
    depends_on:
      opensearch:
        condition: service_healthy

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  opensearch_local_data:
    driver: local
