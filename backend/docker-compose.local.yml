# Development Database Only
# MySQL + Redis for local Spring Boot development

networks:
  dev-network:
    driver: bridge

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: techeer-mysql-dev
    restart: unless-stopped
    env_file:
      - ./backend-secret.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: techeer-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    env_file:
      - ./backend-secret.env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
