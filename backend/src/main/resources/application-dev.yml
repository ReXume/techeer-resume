# Development Profile Configuration
# Docker Compose Dev 환경용 설정 (Dockerfile.dev + docker-compose.dev.yml)
spring:
  config:
    import: "optional:file:backend-secret.env[.properties]"

  # Docker Compose 자동 관리 비활성화 (이미 Docker 내부에서 실행 중)
  docker:
    compose:
      enabled: false

  # Spring Boot DevTools 설정 (코드 변경 시 자동 재시작)
  devtools:
    restart:
      enabled: true
      additional-paths:
        - src/main/java
        - src/main/resources
    livereload:
      enabled: true
      port: 35729

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://mysql:3306/techeer?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USER:sa}
    password: ${MYSQL_PASSWORD:1234}
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  jpa:
    hibernate:
      ddl-auto: update # 개발 시 스키마 자동 업데이트 (데이터 유지)
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        highlight_sql: true
        use_sql_comments: true
        dialect: org.hibernate.dialect.MySQLDialect

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:dev-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:dev-google-client-secret}
            scope:
              - email
              - profile
            redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/login/oauth2/code/google}
          github:
            client-id: ${GITHUB_CLIENT_ID:dev-github-client-id}
            client-secret: ${GITHUB_CLIENT_SECRET:dev-github-client-secret}
            scope:
              - user:email
              - read:user
            redirect-uri: ${GITHUB_REDIRECT_URI:http://localhost:8080/login/oauth2/code/github}

# JWT 설정 (환경변수 우선, 기본값 제공)
jwt:
  secret: ${JWT_SECRET:ZGV2LXNlY3JldC1rZXktZm9yLWxvY2FsLWRldmVsb3BtZW50LW9ubHk=}
  access:
    expiration: ${JWT_ACCESS_EXPIRATION:3600000}
    header: ${JWT_ACCESS_HEADER:Authorization}
  refresh:
    expiration: ${JWT_REFRESH_EXPIRATION:604800000}
    header: ${JWT_REFRESH_HEADER:Authorization-refresh}

opensearch:
  host: ${OPENSEARCH_HOST:opensearch}
  port: ${OPENSEARCH_PORT:9200}

search:
  engine: ${SEARCH_ENGINE:opensearch}

# Google Cloud Storage 설정
gcp:
  project-id: ${GCP_PROJECT_ID}
  service-account:
    key-path: ${GCP_SERVICE_ACCOUNT_KEY_PATH}
  gcs:
    bucket: ${GCS_BUCKET_NAME}
    region: ${GCS_REGION}
    folders:
      profile: ${GCS_PROFILE_FOLDER}
      document: ${GCS_DOCUMENT_FOLDER}
      verification: ${GCS_VERIFICATION_FOLDER}
