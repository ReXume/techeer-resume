# Development Environment with Hot Reload
# Spring Boot DevTools + Binding Mount for instant code changes

networks:
  dev-network:
    driver: bridge

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: techeer-mysql-dev
    restart: unless-stopped
    env_file:
      - ./backend-secret.env
    ports:
      - "3306:3306"
    volumes:
      - mysql_dev_data:/var/lib/mysql
    networks:
      - dev-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: techeer-redis-dev
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_dev_data:/data
    networks:
      - dev-network
    env_file:
      - ./backend-secret.env
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 3s
      retries: 5

  # Spring Boot Application (Development Mode)
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: backend-dev
    restart: unless-stopped
    env_file:
      - ./backend-secret.env
    ports:
      - "8080:8080"
      - "35729:35729" # LiveReload 포트
    volumes:
      # 소스 코드 바인딩 마운트 (코드 변경 시 자동 반영)
      - ./src:/app/src
      - ./build.gradle:/app/build.gradle:ro
      - ./settings.gradle:/app/settings.gradle:ro
      # Gradle 캐시 볼륨 (빌드 속도 향상)
      - gradle_cache:/home/gradle/.gradle
      # 빌드 결과물 (컨테이너 내부에서 생성, 호스트와 충돌 방지)
      - backend_build:/app/build
      # QueryDSL 생성 파일 (컨테이너 내부에서만 관리)
      - generated_sources:/app/src/main/generated
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev-network
    # 헬스체크는 애플리케이션 시작 후 시간이 걸리므로 여유있게 설정
    healthcheck:
      test:
        ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

volumes:
  mysql_dev_data:
    driver: local
  redis_dev_data:
    driver: local
  gradle_cache:
    driver: local
  backend_build:
    driver: local
  generated_sources:
    driver: local
