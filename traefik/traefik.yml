entryPoints:
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
  dashboard:
    address: ":8088"

api:
  dashboard: true
  insecure: false

log:
  level: INFO

accessLog: {}

providers:
  docker:
    exposedByDefault: false
    network: web
  file:
    filename: "/dynamic_conf.yml"

certificatesResolvers:
  letsencrypt:
    acme:
      email: vitash1215@gmail.com
      storage: /etc/traefik/acme.json
      httpChallenge:
        entryPoint: web
