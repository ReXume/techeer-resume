name: Backend Lint

on:
  pull_request:
    types: [labeled, unlabeled] # 라벨 추가/제거 시에만 실행
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:backend') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:quick')

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Make gradlew executable
        run: chmod +x backend/gradlew

      - name: Check Spring Java Format
        working-directory: ./backend
        run: ./gradlew checkFormat --no-daemon

      - name: Run Checkstyle
        working-directory: ./backend
        run: ./gradlew checkstyleMain checkstyleTest --no-daemon

      - name: Run SpotBugs
        working-directory: ./backend
        run: ./gradlew spotbugsMain spotbugsTest --no-daemon

      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-reports
          path: |
            backend/build/reports/checkstyle/
            backend/build/reports/spotbugs/
