# Frontend ESLint 코드 품질 검사 워크플로우
# TypeScript, React 코드 스타일 및 규칙 검증
# 라벨 기반 실행: ci:frontend, ci:all, ci:quick
name: Frontend Lint

on:
  pull_request:
    types: [labeled, unlabeled] # 라벨 추가/제거 시에만 실행
    branches: [main, develop] # main, develop 브랜치 대상

jobs:
  lint:
    runs-on: ubuntu-latest
    # 라벨 조건: ci:frontend, ci:all, ci:quick 중 하나가 있어야 실행
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:frontend') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:quick')

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 18 환경 설정 및 Yarn 캐시
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn" # Yarn 패키지 캐시 활성화
          cache-dependency-path: frontend/yarn.lock

      # 3. 의존성 설치 (lockfile 기반으로 정확한 버전 설치)
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      # 4. ESLint 실행 (코드 스타일 및 규칙 검사)
      - name: Run ESLint
        working-directory: ./frontend
        run: yarn lint

      # 5. 린트 결과 검증
      - name: Check for linting errors
        run: |
          if [ $? -ne 0 ]; then
            echo "Linting failed"
            exit 1
          fi
          echo "Linting passed"
