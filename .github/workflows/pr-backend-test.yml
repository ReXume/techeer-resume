# Backend 단위 테스트 실행 워크플로우
# MySQL, Redis 서비스 포함하여 통합 테스트 환경 구성
# 라벨 기반 실행: ci:backend, ci:all, ci:full
name: Backend Test

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled] # PR 생성, 업데이트, 라벨 변경 시 실행
    branches: [main, develop] # main, develop 브랜치 대상

jobs:
  test:
    runs-on: ubuntu-latest
    # 라벨 조건: ci:backend, ci:all, ci:full 중 하나가 있어야 실행
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:backend') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')

    # 테스트에 필요한 외부 서비스 설정
    services:
      # MySQL 8.0 데이터베이스 (Spring Boot 테스트용)
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      # Redis 7 캐시 서비스 (세션, 캐시 테스트용)
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Java 17 환경 설정
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      # 3. Gradle 캐시 설정 (빌드 속도 향상)
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 4. Gradle wrapper 실행 권한 부여
      - name: Make gradlew executable
        run: chmod +x backend/gradlew

      # 5. 단위 테스트 실행 (MySQL, Redis 연결)
      - name: Run tests
        working-directory: ./backend
        run: ./gradlew test --no-daemon
        env:
          SPRING_PROFILES_ACTIVE: test # 테스트 프로파일 활성화
          MYSQL_URL: jdbc:mysql://localhost:3306/testdb
          MYSQL_USERNAME: root
          MYSQL_PASSWORD: root
          REDIS_HOST: localhost
          REDIS_PORT: 6379

      # 6. JaCoCo 테스트 커버리지 리포트 생성
      - name: Generate test report
        working-directory: ./backend
        run: ./gradlew jacocoTestReport --no-daemon

      # 7. 테스트 결과 아티팩트 업로드 (실패 시에도)
      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always() # 테스트 실패해도 결과 업로드
        with:
          name: test-results
          path: backend/build/reports/tests/test/
