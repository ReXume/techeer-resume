name: CI - Build & Push Backend Image

on:
  push:
    branches:
      - develop
      - main
    paths:
      - backend/**
      - k6/**
      - traefik/**
      - .github/workflows/**
    workflow_dispatch:  # 수동 실행을 위한 트리거

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17 (Amazon Corretto)
        uses: actions/setup-java@v3
        with:
          distribution: 'corretto'
          java-version: '17'

      - name: Grant execute permission
        run: chmod +x ./gradlew

      - name: Build Jar
        run: ./gradlew clean bootJar -x test

      - name: Download NewRelic Jar
        run: |
          mkdir -p ../newrelic
          curl -o ../newrelic/newrelic.jar https://download.newrelic.com/newrelic/java-agent/newrelic-agent/current/newrelic.jar

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_USER_PW }}

      - name: 디렉토리 구조 확인
        run: ls -R

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER_NAME }}/${{ secrets.DOCKER_IMAGE_NAME }}-be:latest

      - name: Upload files to EC2
        working-directory: .  # ✅ 루트 기준으로 전환
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.AWS_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_KEY }}
          source: |
            docker-compose.yml
            docker-compose.app.yml
            docker-compose.monitor.yml
            backend-secret.env
            k6/**
            traefik/**
            newrelic/**

          target: /home/ubuntu/techeer-resume
