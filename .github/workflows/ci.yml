name: CI - Build & Push Backend Image

on:
  push:
    branches: [develop, main]
    paths:
      - backend/**
      - k6/**
      - traefik/**
      - .github/workflows/**
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    environment: production

    defaults:
      run:
        working-directory: backend

    steps:
      # ───── 1. Checkout & Build JAR ─────────────────────────────────
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v3
        with:
          distribution: corretto
          java-version: '17'

      - run: chmod +x ./gradlew
      - run: ./gradlew clean bootJar -x test

      # ───── 2. New Relic 에이전트 준비 (backend/newrelic) ───────────
      - name: Download New Relic agent
        working-directory: backend
        run: |
          mkdir -p newrelic
          curl -sSL -o newrelic/newrelic.jar \
               https://download.newrelic.com/newrelic/java-agent/newrelic-agent/current/newrelic.jar

      # ───── 3. Docker 이미지 빌드 & 푸시 ─────────────────────────────
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER_NAME }}
          password: ${{ secrets.DOCKER_USER_PW }}

      - name: Build & push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USER_NAME }}/${{ secrets.DOCKER_IMAGE_NAME }}-be:latest

      # ───── 4. 원격 디렉터리 권한 준비 ───────────────────────────────
      - name: Prepare target directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AWS_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_KEY }}
          script: |
            sudo mkdir -p /home/ubuntu/techeer-resume
            sudo chown -R ubuntu:ubuntu /home/ubuntu/techeer-resume

      # ───── 5. 파일 전송 (경로 정확히 & 공백 제거) ──────────────────
      - name: Upload compose & config files to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.AWS_IP }}
          username: ubuntu
          key: ${{ secrets.AWS_KEY }}
          source: |
            docker-compose.yml
            docker-compose.app.yml
            docker-compose.monitor.yml
            backend-secret.env
            k6/**
            traefik/**
            backend/newrelic/**        # ← 위치 바뀐 newrelic
          target: /home/ubuntu/techeer-resume
          overwrite: true
