# Frontend TypeScript 타입 체크 워크플로우
# 타입 안전성 검증 및 컴파일 오류 확인
# 라벨 기반 실행: ci:frontend, ci:all, ci:quick
name: Frontend Type Check

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled] # PR 생성, 업데이트, 라벨 변경 시 실행
    branches: [main, develop] # main, develop 브랜치 대상

jobs:
  type-check:
    runs-on: ubuntu-latest
    # 라벨 조건: ci:frontend, ci:all, ci:quick 중 하나가 있어야 실행
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:frontend') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:quick')

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 18 환경 설정 및 Yarn 캐시
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn" # Yarn 패키지 캐시 활성화
          cache-dependency-path: frontend/yarn.lock

      # 3. 의존성 설치 (lockfile 기반으로 정확한 버전 설치)
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      # 4. TypeScript 타입 체크 실행 (컴파일 없이 타입만 검사)
      - name: Run TypeScript type check
        working-directory: ./frontend
        run: yarn type-check

      # 5. 타입 체크 결과 검증
      - name: Check for type errors
        run: |
          if [ $? -ne 0 ]; then
            echo "Type checking failed"
            exit 1
          fi
          echo "Type checking passed"
