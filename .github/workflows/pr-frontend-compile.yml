# Frontend TypeScript 컴파일 및 빌드 검증 워크플로우
# Vite를 사용한 React 앱 빌드 테스트
# 라벨 기반 실행: ci:frontend, ci:all, ci:quick
name: Frontend Compile

on:
  pull_request:
    types: [opened, synchronize, labeled, unlabeled] # PR 생성, 업데이트, 라벨 변경 시 실행
    branches: [main, develop] # main, develop 브랜치 대상

jobs:
  compile:
    runs-on: ubuntu-latest
    # 라벨 조건: ci:frontend, ci:all, ci:quick 중 하나가 있어야 실행
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:frontend') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:quick')

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 18 환경 설정 및 Yarn 캐시
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn" # Yarn 패키지 캐시 활성화
          cache-dependency-path: frontend/yarn.lock

      # 3. 의존성 설치 (lockfile 기반으로 정확한 버전 설치)
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      # 4. TypeScript 컴파일 및 Vite 빌드
      - name: Compile TypeScript
        working-directory: ./frontend
        run: yarn build

      # 5. 빌드 결과물 검증
      - name: Check build artifacts
        run: |
          if [ ! -d "frontend/dist" ]; then
            echo "Build failed - dist directory not found"
            exit 1
          fi
          echo "Build successful"
