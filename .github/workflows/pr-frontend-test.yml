# Frontend 단위 테스트 실행 워크플로우
# Vitest를 사용한 React 컴포넌트 및 유틸리티 테스트
# 라벨 기반 실행: ci:frontend, ci:all, ci:full
name: Frontend Test

on:
  pull_request:
    types: [labeled, unlabeled] # 라벨 추가/제거 시에만 실행
    branches: [main, develop] # main, develop 브랜치 대상

jobs:
  test:
    runs-on: ubuntu-latest
    # 라벨 조건: ci:frontend, ci:all, ci:full 중 하나가 있어야 실행
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:frontend') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Node.js 18 환경 설정 및 Yarn 캐시
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "yarn" # Yarn 패키지 캐시 활성화
          cache-dependency-path: frontend/yarn.lock

      # 3. 의존성 설치 (lockfile 기반으로 정확한 버전 설치)
      - name: Install dependencies
        working-directory: ./frontend
        run: yarn install --frozen-lockfile

      # 4. Vitest 단위 테스트 실행 (watch 모드 비활성화)
      - name: Run tests
        working-directory: ./frontend
        run: yarn test --run

      # 5. 테스트 커버리지 리포트 업로드 (실패 시에도)
      - name: Upload test coverage
        uses: actions/upload-artifact@v4
        if: always() # 테스트 실패해도 커버리지 업로드
        with:
          name: frontend-test-coverage
          path: frontend/coverage/
