# Docker 빌드 테스트 워크플로우
# 백엔드 Docker 이미지 빌드 및 실행 테스트
# 프로덕션 환경과 동일한 조건에서 빌드 검증
# 라벨 기반 실행: ci:docker, ci:all, ci:full
name: Docker Build Test

on:
  pull_request:
    types: [labeled, unlabeled] # 라벨 추가/제거 시에만 실행
    branches: [main, develop] # main, develop 브랜치 대상

jobs:
  docker-build-test:
    runs-on: ubuntu-latest
    # 라벨 조건: ci:docker, ci:all, ci:full 중 하나가 있어야 실행
    if: |
      contains(github.event.pull_request.labels.*.name, 'ci:docker') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all') ||
      contains(github.event.pull_request.labels.*.name, 'ci:full')

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Docker Buildx 설정 (멀티 플랫폼 빌드 지원)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. 백엔드 Docker 이미지 빌드
      - name: Build backend Docker image
        working-directory: ./backend
        run: |
          docker build -t techeer-resume-backend:test .

      # 4. Docker 이미지 실행 테스트
      - name: Test Docker image
        run: |
          # Test if the image can start successfully
          docker run --rm -d --name test-backend -p 8080:8080 techeer-resume-backend:test

          # Wait for the application to start
          timeout 60 bash -c 'until curl -f http://localhost:8080/actuator/health; do sleep 2; done'

          # Clean up
          docker stop test-backend

      # 5. 테스트 완료 후 Docker 이미지 정리 (실패해도 정리)
      - name: Clean up Docker images
        if: always() # 테스트 실패해도 이미지 정리
        run: |
          docker rmi techeer-resume-backend:test || true
