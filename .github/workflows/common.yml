# Common reusable workflows and configurations
name: Common

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for the job"
        required: false
        type: string
        default: "."
      node-version:
        description: "Node.js version"
        required: false
        type: string
        default: "18"
      java-version:
        description: "Java version"
        required: false
        type: string
        default: "17"

env:
  # Common environment variables
  NODE_VERSION: ${{ inputs.node-version || '18' }}
  JAVA_VERSION: ${{ inputs.java-version || '17' }}
  GRADLE_OPTS: -Dorg.gradle.daemon=false
  GRADLE_USER_HOME: ${{ github.workspace }}/.gradle

jobs:
  # This file contains reusable workflows that can be called from other workflows
  # Individual workflows will be defined in separate files for better maintainability
